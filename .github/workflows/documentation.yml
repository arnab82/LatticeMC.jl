name: Documentation

on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:

# Needed for Documenter to push the built site to the gh-pages branch.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v2
      - name: Install doc dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # authenticates deploy to gh-pages
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }} # optional SSH deploy key, if configured
        run: julia --project=docs docs/make.jl
